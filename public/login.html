<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in to MyPulsePro</title>
  <style>
    :root {
      --bg: #0B0F19;
      --surface: rgba(30, 41, 59, 0.6);
      --border: rgba(255, 255, 255, 0.08);
      --teal: #00F0FF;
      --coral: #FF4B4B;
      --text: #F8FAFC;
      --text-muted: #94A3B8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
    body { background-color: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    
    /* Background Elements */
    .bg-glow { position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(0,240,255,0.15) 0%, rgba(11,15,25,0) 70%); top: -200px; left: -200px; z-index: -1; }
    .bg-glow-right { position: absolute; width: 500px; height: 500px; background: radial-gradient(circle, rgba(255,75,75,0.1) 0%, rgba(11,15,25,0) 70%); bottom: -100px; right: -100px; z-index: -1; }
    
    .auth-card {
      background: var(--surface); backdrop-filter: blur(16px);
      border: 1px solid var(--border); border-radius: 24px;
      padding: 40px; width: 100%; max-width: 420px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      animation: float-up 0.5s ease-out;
    }
    @keyframes float-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    
    .brand { font-size: 1.5rem; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 32px; }
    .brand svg { color: var(--teal); width: 28px; }
    
    h2 { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; text-align: center; }
    p.subtitle { color: var(--text-muted); text-align: center; margin-bottom: 32px; font-size: 0.95rem; }
    
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px; }
    .form-control { width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border); color: var(--text); padding: 14px 16px; border-radius: 12px; font-size: 1rem; transition: 0.2s; }
    .form-control:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 3px rgba(0,240,255,0.1); }
    
    .btn-primary { width: 100%; background: linear-gradient(135deg, #00C6FF, #0072FF); color: white; border: none; padding: 14px; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 12px rgba(0,114,255,0.2); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,114,255,0.3); }
    
    .divider { display: flex; align-items: center; margin: 24px 0; color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); margin: 0 16px; }
    
    .btn-social { width: 100%; background: transparent; border: 1px solid var(--border); color: var(--text); padding: 14px; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 12px; }
    .btn-social:hover { background: rgba(255,255,255,0.05); }
    .btn-social img { width: 20px; }
    
    .footer-text { text-align: center; margin-top: 32px; font-size: 0.9rem; color: var(--text-muted); }
    .footer-text a { color: var(--teal); text-decoration: none; font-weight: 600; }
    .footer-text a:hover { text-decoration: underline; }

    #error-msg { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #EF4444; padding: 12px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 20px; display: none; text-align: center; }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="bg-glow-right"></div>

  <div class="auth-card">
    <div class="brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      MyPulsePro
    </div>
    
    <h2>Welcome Back!</h2>
    <p class="subtitle">Access your personal health intelligence.</p>

    <div id="error-msg"></div>

    <form id="login-form">
      <div class="form-group">
        <label>Username / Email</label>
        <input type="text" id="username" class="form-control" placeholder="e.g. test_user" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-primary" id="btn-submit">Sign In to Dashboard</button>
    </form>

    <div class="divider">OR</div>

    <button class="btn-social" type="button" id="btn-google">
      <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continue with Google
    </button>

    <div class="footer-text">
      New to MyPulsePro? <a href="/register.html">Create an Account</a>
    </div>
  </div>

  <script type="module">
    // ─── Real Firebase Google Auth Integration ───
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    // TODO: Paste your Firebase config here from console.firebase.google.com
    const firebaseConfig = {
      apiKey: "PASTE_YOUR_API_KEY_HERE",
      authDomain: "your-app.firebaseapp.com",
      projectId: "your-app",
      storageBucket: "your-app.appspot.com",
      messagingSenderId: "123456789",
      appId: "1:123456789:web:abcdef"
    };

    let auth, provider;
    try {
      const app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      provider = new GoogleAuthProvider();
    } catch (e) {
      console.warn("Firebase not configured. Please paste your API keys.");
    }

    const errBox = document.getElementById('error-msg');

    // 1. Google Auth Flow
    document.getElementById('btn-google').addEventListener('click', async () => {
      if (!auth) {
        errBox.style.display = 'block';
        errBox.textContent = "Developer Note: Firebase API Keys are missing in login.html source code.";
        return;
      }
      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        // Verify token with backend securely
        const token = await user.getIdToken();
        localStorage.setItem('auth_token', token);
        localStorage.setItem('username', user.displayName || user.email);
        
        // Custom backend check if new user -> redirect to onboarding
        window.location.href = '/app.html';
      } catch (error) {
        errBox.style.display = 'block';
        errBox.textContent = error.message;
      }
    });

    // 2. Standard Email/Password Flow
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-submit');
      btn.textContent = 'Authenticating...';
      
      if (!auth) {
        // Fallback simulation for testing without keys
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        if (user === 'test_user' && pass === 'password') {
          localStorage.setItem('auth_token', 'mock_jwt_test_user_8a9b7c6d');
          localStorage.setItem('username', 'test_user');
          window.location.href = '/app.html';
          return;
        }
        errBox.style.display = 'block';
        errBox.textContent = "Firebase missing. Demo fallback: use test_user / password";
        btn.textContent = 'Sign In to Dashboard';
        return;
      }

      try {
        const userCredential = await signInWithEmailAndPassword(
          auth, 
          document.getElementById('username').value, 
          document.getElementById('password').value
        );
        const token = await userCredential.user.getIdToken();
        localStorage.setItem('auth_token', token);
        localStorage.setItem('username', userCredential.user.email);
        window.location.href = '/app.html';
      } catch (error) {
        errBox.style.display = 'block';
        errBox.textContent = error.message;
        btn.textContent = 'Sign In to Dashboard';
      }
    });

    if (localStorage.getItem('auth_token')) {
      window.location.href = '/app.html';
    }
  </script>
</body>
</html>
